  <main>
    <section class="section">
      <div class="container two-col">
        <div>
          <h1 class="section-title">Contact</h1>
          <p class="lead">I’m open to opportunities in gender, migration policy, operations and governance.</p>
          <ul class="contact-list">
            <li><strong>Email</strong>: <a href="mailto:info@winnieakelloarink.com">info@winnieakelloarink.com</a></li>
            <li><strong>LinkedIn</strong>: <a href="#" id="linkedin-link" rel="noopener">Add link</a></li>
          </ul>
        </div>
        <form class="contact-form" action="mailto:info@winnieakelloarink.com" method="post" enctype="text/plain">
          <label>
            Name
            <input type="text" name="name" placeholder="Your name" required />
          </label>
          <label>
            Email
            <input type="email" name="email" placeholder="you@example.com" required />
          </label>
          <label>
            Message
            <textarea name="message" rows="5" placeholder="How can I help?" required></textarea>
          </label>
          <button class="btn primary" type="submit">Send</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
